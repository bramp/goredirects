repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: go-format
        name: go-format
        entry: make format
        language: system
        files: '\.go$'
        pass_filenames: false

      - id: go-analyze
        name: go-analyze
        entry: make analyze
        language: system
        files: '\.go$'
        pass_filenames: false

      - id: go-test
        name: go-test
        entry: make test
        language: system
        files: '\.go$'
        pass_filenames: false
